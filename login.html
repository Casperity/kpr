<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | kpr.lol</title>
  <meta name="description" content="Sign in page - bio-link profile service, show projects and etc." />
  <meta name="theme-color" content="#03050f" />
  <meta property="og:title" content="Login | kpr.lol" />
  <meta property="og:description" content="Sign in page" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kpr.lol/login" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>

  <div class="auth-bg">
    <div class="noise"></div>
  </div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-brand">
        <span class="logo-text">kpr<span class="logo-dot">.lol</span></span>
      </div>

      <div class="auth-heading">
        <h1>Welcome back</h1>
        <p>Sign in to your account</p>
      </div>

      <form id="login-form" autocomplete="on" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              spellcheck="false"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility" tabindex="-1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="login-btn">
          <span class="btn-text">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Sign In
          </span>
          <span class="btn-spinner">
            <span class="spinner"></span>
            Signing in…
          </span>
        </button>

      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Sign up</a>
      </div>

    </div>
  </div>

  <!-- ── Scripts ──────────────────────────────────────── -->
  <script src="api.js"></script>
  <script>
    /* ── ClickSpark Canvas Component ─────────────────── */
    class ClickSpark {
      constructor(options = {}) {
        this.sparkColor = options.sparkColor || '#fff';
        this.sparkSize = options.sparkSize || 10;
        this.sparkRadius = options.sparkRadius || 15;
        this.sparkCount = options.sparkCount || 8;
        this.duration = options.duration || 400;
        this.easing = options.easing || 'ease-out';
        this.extraScale = options.extraScale !== undefined ? options.extraScale : 1.0;
        
        this.sparks = [];
        this.startTime = null;
        this.init();
      }
      
      init() {
        this.canvas = document.createElement('canvas');
        this.canvas.style.cssText = `
          width: 100%;
          height: 100%;
          display: block;
          user-select: none;
          position: absolute;
          top: 0;
          left: 0;
          pointer-events: none;
          z-index: 9999;
        `;
        document.body.appendChild(this.canvas);
        this.ctx = this.canvas.getContext('2d');
        
        const resizeCanvas = () => {
          if (this.canvas.width !== window.innerWidth || this.canvas.height !== window.innerHeight) {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
          }
        };
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        document.body.addEventListener('click', (e) => this.handleClick(e));
        this.animate();
      }
      
      easeFunc(t) {
        switch (this.easing) {
          case 'linear': return t;
          case 'ease-in': return t * t;
          case 'ease-in-out': return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
          default: return t * (2 - t);
        }
      }
      
      handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const now = performance.now();
        const newSparks = Array.from({ length: this.sparkCount }, (_, i) => ({
          x,
          y,
          angle: (2 * Math.PI * i) / this.sparkCount,
          startTime: now
        }));
        this.sparks.push(...newSparks);
      }
      
      animate() {
        const draw = () => {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          const now = performance.now();
          this.sparks = this.sparks.filter(spark => {
            const elapsed = now - spark.startTime;
            if (elapsed >= this.duration) return false;
            
            const progress = elapsed / this.duration;
            const eased = this.easeFunc(progress);
            const distance = eased * this.sparkRadius * this.extraScale;
            const lineLength = this.sparkSize * (1 - eased);
            
            const x1 = spark.x + distance * Math.cos(spark.angle);
            const y1 = spark.y + distance * Math.sin(spark.angle);
            const x2 = spark.x + (distance + lineLength) * Math.cos(spark.angle);
            const y2 = spark.y + (distance + lineLength) * Math.sin(spark.angle);
            
            this.ctx.strokeStyle = this.sparkColor;
            this.ctx.lineWidth = 2;
            this.ctx.beginPath();
            this.ctx.moveTo(x1, y1);
            this.ctx.lineTo(x2, y2);
            this.ctx.stroke();
            return true;
          });
          requestAnimationFrame(draw);
        };
        requestAnimationFrame(draw);
      }
    }

    (function() {
      'use strict';

      /* Initialize ClickSpark */
      new ClickSpark({
        sparkColor: '#fff',
        sparkSize: 11,
        sparkRadius: 20,
        sparkCount: 6,
        duration: 500
      });

      if (API.isLoggedIn()) {
        window.location.href = '/dashboard';
        return;
      }

      const form      = document.getElementById('login-form');
      const btn       = document.getElementById('login-btn');
      const userInput = document.getElementById('username');
      const passInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');

      toggleBtn.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        toggleBtn.querySelector('i').className =
          isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
      });

      function setLoading(loading) {
        btn.classList.toggle('loading', loading);
        btn.disabled = loading;
        userInput.disabled = loading;
        passInput.disabled = loading;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = userInput.value.trim();
        const password = passInput.value;

        if (!username) {
          Toast.show('Please enter your username.', 'error');
          userInput.focus();
          return;
        }
        if (!password) {
          Toast.show('Please enter your password.', 'error');
          passInput.focus();
          return;
        }

        setLoading(true);

        try {
          const data = await API.login(username, password);

          if (data.token) API.setToken(data.token);
          if (data.user)  API.setUser(data.user);

          Toast.show('Welcome back!', 'success', 2000);

          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 600);

        } catch (err) {
          setLoading(false);
          const msg = err.message || err.error || 'Login failed. Please try again.';
          Toast.show(msg, 'error');

          const card = document.querySelector('.auth-card');
          card.style.animation = 'none';
          card.offsetHeight;
          card.style.animation = 'shake 0.5s ease';
        }
      });

      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passInput.focus();
        }
      });

      userInput.focus();

    })();
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
  </style>

</body>
</html>
