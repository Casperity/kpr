<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | kpr.lol</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/dashboard.css">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    #users-search:focus {
      outline: none;
      border-color: rgba(52, 194, 122, 0.5) !important;
    }
    #users-load-more:hover {
      background: rgba(255, 255, 255, 0.08) !important;
      color: #fff !important;
    }
    
    /* --- Actions Menu Card --- */
    .card {
      width: 160px;
      background-color: rgba(20, 24, 22, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 8px 0px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card .separator {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 4px 0;
    }

    .card .list {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0px 8px;
      margin: 0;
    }

    .card .list .element {
      display: flex;
      align-items: center;
      color: #8B9089;
      gap: 8px;
      transition: all 0.2s ease-out;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .card .list .element i {
      font-size: 0.85rem;
      width: 16px;
      text-align: center;
      transition: all 0.2s ease-out;
    }

    .card .list .element .label {
      font-weight: 600;
      margin: 0;
      color: inherit;
    }

    .card .list .element:hover {
      background-color: rgba(255, 255, 255, 0.08);
      color: #ECEEE9;
      transform: translateX(2px);
    }

    .card .list .element:hover i {
      color: #ECEEE9;
    }

    .card .list .delete:hover {
      background-color: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .action-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <!-- Custom In-UI Modal Overlay for Confirm & Prompt -->
  <div id="admin-modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:10000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:rgba(20,24,22,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:20px; width:100%; max-width:440px; padding:28px; box-shadow:0 20px 50px rgba(0,0,0,0.6);">
      <div id="admin-modal-title" style="font-size:1.15rem; font-weight:700; color:#ECEEE9; margin-bottom:10px;">Modal Title</div>
      <div id="admin-modal-desc" style="font-size:0.875rem; color:#8B9089; line-height:1.5; margin-bottom:20px;">Modal message goes here</div>
      <div id="admin-modal-input-wrap" style="display:none; margin-bottom:20px;">
        <input type="text" id="admin-modal-input" class="form-input" style="width:100%; box-sizing:border-box;" />
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button id="admin-modal-cancel" style="padding:10px 20px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#8B9089; font-weight:600; cursor:pointer;">Cancel</button>
        <button id="admin-modal-confirm" style="padding:10px 22px; background:#F3EFE2; border:none; border-radius:12px; color:#0E1210; font-weight:600; cursor:pointer;">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Sidebar App Layout -->
  <div class="dash-layout">

    <!-- Mobile Header Bar -->
    <header class="dash-mobile-header">
      <a href="/" class="dash-sidebar-brand">kpr<span>.lol</span></a>
      <button class="dash-sidebar-toggle" id="dash-sidebar-toggle" aria-label="Toggle Navigation Menu">
        <i class="fas fa-bars"></i>
      </button>
    </header>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="dash-sidebar-overlay" id="dash-sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar">
      <div class="dash-sidebar-header">
        <a href="/" class="dash-sidebar-brand">kpr<span>.lol</span></a>
      </div>

      <!-- Quick User Card -->
      <div class="dash-sidebar-user">
        <div class="dash-sidebar-avatar-wrap">
          <img id="sidebar-avatar" src="/pfp.jpg" alt="Avatar" class="dash-sidebar-avatar" />
        </div>
        <div class="dash-sidebar-user-info">
          <span id="sidebar-name" class="dash-sidebar-name">Admin</span>
          <span id="sidebar-handle" class="dash-sidebar-handle">@admin</span>
        </div>
      </div>

      <!-- Sidebar Navigation Links -->
      <nav class="dash-sidebar-menu">
        <div class="dash-sidebar-label">NAVIGATION</div>
        <a href="/dashboard" class="dash-sidebar-link">
          <i class="fas fa-sliders"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" id="nav-view-profile" class="dash-sidebar-link" target="_blank">
          <i class="fas fa-external-link-alt"></i>
          <span>View Profile</span>
        </a>
        <a href="/admin" id="nav-admin" class="dash-sidebar-link active" style="color:#34C27A;">
          <i class="fas fa-shield-halved"></i>
          <span>Admin Panel</span>
        </a>
        <a href="/settings" class="dash-sidebar-link">
          <i class="fas fa-gear"></i>
          <span>Settings</span>
        </a>
      </nav>

      <!-- Sidebar Footer -->
      <div class="dash-sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <main class="dash-main">
      <div class="admin-content" style="padding: 32px 36px; max-width: 1100px; margin: 0 auto; width: 100%;">
    
    <!-- Invite Codes Panel -->
    <div class="dash-section" id="section-invites" style="margin-bottom: 2rem;">
      <div class="dash-section-header">
        <div class="dash-section-title">
          <i class="fas fa-ticket-alt" style="color:#34C27A;"></i> Invite Codes
        </div>
      </div>
      <div class="dash-section-body" style="display: block;">
        
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items:center;">
          <input type="number" id="invite-count" class="form-input" value="1" min="1" max="50" style="width: 100px;">
          <button id="btn-generate" class="btn-generate" style="width: auto;">Generate Codes</button>
        </div>

        <!-- Bulk Invites Bar -->
        <div id="invites-bulk-bar" style="display:none; align-items:center; justify-content:space-between; background:rgba(52,194,122,0.1); border:1px solid rgba(52,194,122,0.3); padding:10px 16px; border-radius:12px; margin-bottom:12px;">
          <span id="invites-bulk-count" style="font-size:0.85rem; color:#ECEEE9; font-weight:600;">0 selected</span>
          <button id="btn-bulk-delete-invites" style="padding:6px 14px; background:#ef4444; border:none; border-radius:8px; color:#fff; font-size:0.8rem; font-weight:600; cursor:pointer;">
            <i class="fas fa-trash"></i> Delete Selected
          </button>
        </div>

        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color:#8B9089; font-size:0.85rem;">
                <th style="padding: 1rem; width: 40px;">
                  <input type="checkbox" id="select-all-invites" style="cursor:pointer;" />
                </th>
                <th style="padding: 1rem;">Code</th>
                <th style="padding: 1rem;">Status</th>
                <th style="padding: 1rem;">Used By</th>
                <th style="padding: 1rem;">Created</th>
                <th style="padding: 1rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="invites-tbody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Users & Badges Panel -->
    <div class="dash-section" id="section-users" style="margin-bottom: 2rem;">
      <div class="dash-section-header">
        <div class="dash-section-title">
          <i class="fas fa-users" style="color:#34C27A;"></i> Users & Badges
        </div>
      </div>
      <div class="dash-section-body" style="display: block;">
        <!-- Search bar -->
        <div style="margin-bottom: 16px; position: relative;">
          <input type="text" id="users-search" placeholder="Search by username or display name..." style="width: 100%; padding: 12px 16px 12px 40px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-family: inherit; font-size: 0.875rem; box-sizing: border-box; transition: border-color 0.2s;" />
          <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 0.85rem;"></i>
        </div>

        <!-- Bulk Users Bar -->
        <div id="users-bulk-bar" style="display:none; align-items:center; justify-content:space-between; background:rgba(52,194,122,0.1); border:1px solid rgba(52,194,122,0.3); padding:10px 16px; border-radius:12px; margin-bottom:12px; flex-wrap:wrap; gap:10px;">
          <span id="users-bulk-count" style="font-size:0.85rem; color:#ECEEE9; font-weight:600;">0 selected</span>
          <div style="display:flex; gap:8px;">
            <button id="btn-bulk-vip" style="padding:6px 14px; background:#34C27A; border:none; border-radius:8px; color:#0E1210; font-size:0.8rem; font-weight:600; cursor:pointer;">
              <i class="fas fa-crown"></i> Give VIP
            </button>
            <button id="btn-bulk-unvip" style="padding:6px 14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:#ECEEE9; font-size:0.8rem; font-weight:600; cursor:pointer;">
              <i class="fas fa-times"></i> Remove VIP
            </button>
            <button id="btn-bulk-wipe-comments" style="padding:6px 14px; background:#f59e0b; border:none; border-radius:8px; color:#0E1210; font-size:0.8rem; font-weight:600; cursor:pointer;">
              <i class="fas fa-comments"></i> Wipe Comments
            </button>
          </div>
        </div>

        <div id="users-list" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;"></div>

        <!-- Load More Button -->
        <button id="users-load-more" style="display: none; width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: rgba(255,255,255,0.85); font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.2s, color 0.2s;">
          <i class="fas fa-arrow-down" style="margin-right: 6px;"></i>Load More
        </button>
      </div>
    </div>

    <!-- Audit Logs Panel -->
    <div class="dash-section" id="section-audit-logs" style="margin-bottom: 2rem;">
      <div class="dash-section-header" style="display:flex; justify-content:space-between; align-items:center;">
        <div class="dash-section-title">
          <i class="fas fa-history" style="color:#34C27A;"></i> Admin Audit Logs
        </div>
        <button id="btn-refresh-audit" style="background:none; border:none; color:#34C27A; cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:6px;">
          <i class="fas fa-rotate"></i> Refresh
        </button>
      </div>
      <div class="dash-section-body" style="display: block;">
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color:#8B9089; font-size:0.85rem;">
                <th style="padding: 1rem;">Timestamp</th>
                <th style="padding: 1rem;">Admin</th>
                <th style="padding: 1rem;">Action</th>
                <th style="padding: 1rem;">Target User</th>
                <th style="padding: 1rem;">Details</th>
              </tr>
            </thead>
            <tbody id="audit-logs-tbody">
              <tr><td colspan="5" style="padding: 1rem; text-align: center; color: rgba(255,255,255,0.4);">Loading audit logs...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

      </div>
    </main>
  </div>

  <script src="/api.js"></script>
  <script>
    if (!API.isLoggedIn()) {
      window.location.href = '/login';
    }

    /* ── Custom In-UI Modal System ── */
    function showConfirmModal(title, desc) {
      return new Promise((resolve) => {
        document.getElementById('admin-modal-title').textContent = title;
        document.getElementById('admin-modal-desc').textContent = desc;
        document.getElementById('admin-modal-input-wrap').style.display = 'none';
        document.getElementById('admin-modal-overlay').style.display = 'flex';
        
        document.getElementById('admin-modal-confirm').onclick = () => {
          closeModal();
          resolve(true);
        };
        document.getElementById('admin-modal-cancel').onclick = () => {
          closeModal();
          resolve(false);
        };
      });
    }

    function showPromptModal(title, desc, placeholder = '', defaultValue = '') {
      return new Promise((resolve) => {
        document.getElementById('admin-modal-title').textContent = title;
        document.getElementById('admin-modal-desc').textContent = desc;
        const input = document.getElementById('admin-modal-input');
        input.placeholder = placeholder;
        input.value = defaultValue;
        document.getElementById('admin-modal-input-wrap').style.display = 'block';
        document.getElementById('admin-modal-overlay').style.display = 'flex';
        input.focus();

        document.getElementById('admin-modal-confirm').onclick = () => {
          const val = input.value;
          closeModal();
          resolve(val);
        };
        document.getElementById('admin-modal-cancel').onclick = () => {
          closeModal();
          resolve(null);
        };
      });
    }

    function closeModal() {
      document.getElementById('admin-modal-overlay').style.display = 'none';
    }

    function updateSidebarUserInfo(u) {
      if (!u) return;
      const sidebarName = document.getElementById('sidebar-name');
      const sidebarHandle = document.getElementById('sidebar-handle');
      const sidebarAvatar = document.getElementById('sidebar-avatar');
      const navViewProfile = document.getElementById('nav-view-profile');

      const displayName = (u.displayName || u.display_name || u.username || 'Admin').trim();
      const username = (u.username || '').trim();
      const avatarUrl = (u.avatarUrl || u.avatar_url || '').trim();

      if (sidebarName) sidebarName.textContent = displayName || username || 'Admin';
      if (sidebarHandle) sidebarHandle.textContent = username ? '@' + username : '';
      if (sidebarAvatar) {
        sidebarAvatar.src = avatarUrl || '/pfp.jpg';
        sidebarAvatar.onerror = () => { sidebarAvatar.src = '/pfp.jpg'; };
      }
      if (navViewProfile) navViewProfile.href = '/' + (username || '');
    }

    updateSidebarUserInfo(API.getUser());

    async function loadAdminUser() {
      try {
        const res = await API.getMe();
        const user = res.user || res;
        API.setUser(user);
        updateSidebarUserInfo(user);
      } catch (err) {
        console.error('Failed to load admin profile info', err);
      }
    }
    loadAdminUser();

    // Mobile sidebar toggle
    const sidebarToggle = document.getElementById('dash-sidebar-toggle');
    const sidebarEl = document.getElementById('dash-sidebar');
    const sidebarOverlay = document.getElementById('dash-sidebar-overlay');

    if (sidebarToggle && sidebarEl && sidebarOverlay) {
      sidebarToggle.addEventListener('click', () => {
        sidebarEl.classList.toggle('open');
        sidebarOverlay.classList.toggle('open');
      });
      sidebarOverlay.addEventListener('click', () => {
        sidebarEl.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      });
    }

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => {
      API.logout();
      window.location.href = '/login';
    });

    /* ── Badge Catalog ── */
    const BADGE_CATALOG = {
      dev:         { icon: 'fas fa-code',            label: 'Developer',    color: '#34C27A' },
      og:          { icon: 'fas fa-crown',           label: 'OG',           color: '#facc15' },
      supporter:   { icon: 'fas fa-heart',           label: 'Supporter',    color: '#f472b6' },
      vip:         { icon: 'fas fa-gem',             label: 'VIP',          color: '#38bdf8' },
      verified:    { icon: 'fas fa-store',           label: 'Verified Seller', color: '#4ade80' },
      staff:       { icon: 'fas fa-shield-halved',   label: 'Staff',        color: '#fb923c' },
      beta:        { icon: 'fas fa-flask',           label: 'Beta Tester',  color: '#c084fc' },
      contributor: { icon: 'fas fa-code-branch',     label: 'Contributor',  color: '#34d399' },
      partner:     { icon: 'fas fa-handshake',       label: 'Partner',      color: '#fbbf24' },
      donor:       { icon: 'fas fa-dollar-sign',     label: 'Donor',        color: '#22d3ee' },
      bughunter:   { icon: 'fas fa-bug',             label: 'Bug Hunter',   color: '#0CE600' },
    };

    /* ── Invites System ── */
    let selectedInvites = new Set();
    let currentInvitesList = [];

    async function loadInvites() {
      try {
        const data = await API.getInvites();
        currentInvitesList = data.invites || [];
        const tbody = document.getElementById('invites-tbody');
        tbody.innerHTML = '';
        selectedInvites.clear();
        updateInvitesBulkBar();

        if (!currentInvitesList || currentInvitesList.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="padding: 1rem; text-align: center; color: rgba(255,255,255,0.5);">No invite codes found</td></tr>';
          return;
        }

        currentInvitesList.forEach(inv => {
          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
          
          const statusColor = inv.isUsed ? 'rgba(255,255,255,0.3)' : '#34C27A';
          const statusText = inv.isUsed ? 'Used' : 'Available';
          const usedBy = inv.usedBy ? `<a href="/${inv.usedBy}" target="_blank" style="color: #34C27A; font-weight:600;">${inv.usedBy}</a>` : '-';
          const date = new Date(inv.createdAt).toLocaleDateString();

          tr.innerHTML = `
            <td style="padding: 1rem;">
              ${!inv.isUsed ? `<input type="checkbox" class="invite-checkbox" data-code="${inv.code}" style="cursor:pointer;" />` : ''}
            </td>
            <td style="padding: 1rem; font-family: monospace; font-weight:600; color:#ECEEE9;">${inv.code}</td>
            <td style="padding: 1rem;">
              <span style="background: rgba(52,194,122,0.12); color: ${statusColor}; border:1px solid rgba(52,194,122,0.2); padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">
                ${statusText}
              </span>
            </td>
            <td style="padding: 1rem;">${usedBy}</td>
            <td style="padding: 1rem; color: #8B9089; font-size:0.85rem;">${date}</td>
            <td style="padding: 1rem;">
              <button onclick="copyCode('${inv.code}')" style="background: none; border: none; color: #ECEEE9; cursor: pointer; margin-right: 10px;" title="Copy">
                <i class="fas fa-copy"></i>
              </button>
              ${!inv.isUsed ? `
              <button onclick="deleteCode('${inv.code}')" style="background: none; border: none; color: #ef4444; cursor: pointer;" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
              ` : ''}
            </td>
          `;
          tbody.appendChild(tr);
        });

        // Add checkbox listeners
        tbody.querySelectorAll('.invite-checkbox').forEach(cb => {
          cb.addEventListener('change', () => {
            if (cb.checked) selectedInvites.add(cb.dataset.code);
            else selectedInvites.delete(cb.dataset.code);
            updateInvitesBulkBar();
          });
        });

      } catch (err) {
        if (err.status === 403) {
          document.body.innerHTML = '<h1 style="color: white; text-align: center; margin-top: 20vh;">Access Denied. Admins Only.</h1>';
        } else {
          console.error(err);
        }
      }
    }

    function updateInvitesBulkBar() {
      const bar = document.getElementById('invites-bulk-bar');
      const countEl = document.getElementById('invites-bulk-count');
      if (selectedInvites.size > 0) {
        bar.style.display = 'flex';
        countEl.textContent = `${selectedInvites.size} code(s) selected`;
      } else {
        bar.style.display = 'none';
      }
    }

    document.getElementById('select-all-invites').addEventListener('change', (e) => {
      const checked = e.target.checked;
      document.querySelectorAll('.invite-checkbox').forEach(cb => {
        cb.checked = checked;
        if (checked) selectedInvites.add(cb.dataset.code);
        else selectedInvites.delete(cb.dataset.code);
      });
      updateInvitesBulkBar();
    });

    document.getElementById('btn-bulk-delete-invites').addEventListener('click', async () => {
      const codes = Array.from(selectedInvites);
      if (!codes.length) return;
      const ok = await showConfirmModal('Bulk Delete Invites', `Are you sure you want to delete ${codes.length} selected invite code(s)?`);
      if (!ok) return;

      try {
        await API.bulkDeleteInvites(codes);
        Toast.show(`Deleted ${codes.length} invite code(s)`, 'success');
        loadInvites();
        loadAuditLogs();
      } catch (err) {
        Toast.show(err.error || 'Failed to bulk delete invites', 'error');
      }
    });

    document.getElementById('btn-generate').addEventListener('click', async () => {
      const count = parseInt(document.getElementById('invite-count').value) || 1;
      try {
        await API.createInvites(count);
        loadInvites();
        loadAuditLogs();
        Toast.show(`Generated ${count} code(s)`, 'success');
      } catch (err) {
        console.error(err);
        Toast.show('Failed to generate codes', 'error');
      }
    });

    window.copyCode = (code) => {
      navigator.clipboard.writeText(code);
      Toast.show('Copied to clipboard', 'success');
    };

    window.deleteCode = async (code) => {
      const ok = await showConfirmModal('Delete Invite Code', `Delete invite code "${code}"?`);
      if (!ok) return;
      try {
        await API.deleteInvite(code);
        loadInvites();
        loadAuditLogs();
        Toast.show('Code deleted', 'success');
      } catch (err) {
        console.error(err);
        Toast.show('Failed to delete code', 'error');
      }
    };

    loadInvites();

    /* ── Users & Badges System ── */
    let allUsers = [];
    let selectedUsers = new Set();
    let allowedBadges = Object.keys(BADGE_CATALOG);

    async function loadUsers() {
      try {
        const data = await API.getUsers();
        allUsers = data.users || [];
        if (data.allowedBadges) allowedBadges = data.allowedBadges;
        renderUsers();
      } catch (err) {
        if (err.status === 403) return;
        console.error(err);
      }
    }

    let visibleCount = 10;
    let searchQuery = '';

    function updateUsersBulkBar() {
      const bar = document.getElementById('users-bulk-bar');
      const countEl = document.getElementById('users-bulk-count');
      if (selectedUsers.size > 0) {
        bar.style.display = 'flex';
        countEl.textContent = `${selectedUsers.size} user(s) selected`;
      } else {
        bar.style.display = 'none';
      }
    }

    function renderUsers() {
      const container = document.getElementById('users-list');
      const loadMoreBtn = document.getElementById('users-load-more');
      
      const query = searchQuery.trim().toLowerCase();
      const filtered = allUsers.filter(u => {
        const usernameMatch = u.username && u.username.toLowerCase().includes(query);
        const displayNameMatch = u.displayName && u.displayName.toLowerCase().includes(query);
        return usernameMatch || displayNameMatch;
      });

      if (!filtered.length) {
        container.innerHTML = '<div style="color: rgba(255,255,255,0.4); text-align: center; padding: 1rem;">No users found</div>';
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
        return;
      }

      const sliced = filtered.slice(0, visibleCount);

      if (loadMoreBtn) {
        loadMoreBtn.style.display = filtered.length > visibleCount ? 'block' : 'none';
      }

      container.innerHTML = sliced.map(u => {
        const userBadges = u.badges || [];
        const badgePills = allowedBadges.map(id => {
          const b = BADGE_CATALOG[id] || { icon: 'fas fa-certificate', label: id, color: '#888' };
          const active = userBadges.includes(id);
          return `<button class="badge-pill ${active ? 'active' : ''}" data-user="${u.id}" data-badge="${id}" style="--badge-color: ${b.color};" title="${b.label}"><i class="${b.icon}"></i></button>`;
        }).join('');

        const banBtnLabel = u.isBanned ? 'Unban' : 'Ban';
        const banBtnColor = u.isBanned ? '#34C27A' : '#ef4444';
        const banBtnIcon = u.isBanned ? 'fa-lock-open' : 'fa-ban';
        const banInfo = u.isBanned
          ? `<span style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; margin-left: 6px;" title="Reason: ${u.banReason || 'N/A'}">BANNED</span>`
          : '';

        const isChecked = selectedUsers.has(String(u.id));

        const emailTag = u.email
          ? (u.isVerified
              ? `<span style="background:rgba(52,194,122,0.12); border:1px solid rgba(52,194,122,0.25); color:#34C27A; padding:1px 7px; border-radius:8px; font-size:0.7rem; font-weight:600;" title="${u.email}"><i class="fas fa-circle-check" style="margin-right:4px;"></i>${u.email}</span>`
              : `<span style="background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.25); color:#f59e0b; padding:1px 7px; border-radius:8px; font-size:0.7rem; font-weight:600;" title="${u.email} (Unverified)"><i class="fas fa-clock" style="margin-right:4px;"></i>${u.email} (Unverified)</span>`)
          : `<span style="color:#8B9089; font-size:0.72rem; font-style:italic;">No Email</span>`;

        return `
          <div style="background: rgba(20,24,22,0.65); border: 1px solid ${u.isBanned ? 'rgba(239,68,68,0.3)' : 'rgba(255,255,255,0.07)'}; border-radius: 16px; padding: 16px 20px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
              <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <input type="checkbox" class="user-checkbox" data-user="${u.id}" ${isChecked ? 'checked' : ''} style="cursor:pointer;" />
                <a href="/${u.username}" target="_blank" style="color: #ECEEE9; text-decoration: none; font-weight: 600; font-size:1rem;">${u.username}</a>
                ${u.displayName ? `<span style="color: #8B9089; font-size:0.88rem;">(${u.displayName})</span>` : ''}
                ${u.isAdmin ? '<span style="background: #fb923c; color: #0E1210; padding: 1px 7px; border-radius: 8px; font-size: 0.7rem; font-weight: 700;">ADMIN</span>' : ''}
                ${u.isVip ? `<span style="background: #34C27A; color: #0E1210; padding: 1px 7px; border-radius: 8px; font-size: 0.7rem; font-weight: 700;" title="${u.vipExpiresAt ? 'Expires: ' + new Date(u.vipExpiresAt).toLocaleString() : 'Permanent VIP'}">VIP${u.vipExpiresAt ? ' (Temp)' : ''}</span>` : ''}
                ${emailTag}
                ${banInfo}
              </div>
              <div style="display:flex; align-items:center; gap:10px; position:relative;">
                  <span style="color: #8B9089; font-size: 0.75rem; font-family:monospace;">ID: ${u.id}</span>
              
                  <button class="actions-trigger-btn" data-user="${u.id}" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ECEEE9; padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    <i class="fas fa-ellipsis-v"></i> Actions
                  </button>

                  <div class="actions-dropdown-card" id="actions-dropdown-${u.id}" style="display: none; position: absolute; right: 0; top: calc(100% + 6px); z-index: 100;">
                    <div class="card">
                      <ul class="list">
                        <li class="element vip-btn" data-user="${u.id}" data-vip="${u.isVip}">
                          <i class="fas fa-crown" style="color: ${u.isVip ? '#ef4444' : '#34C27A'};"></i>
                          <p class="label">${u.isVip ? 'Remove VIP' : 'Give VIP'}</p>
                        </li>
                        <li class="element change-email-btn" data-user="${u.id}" data-username="${u.username}" data-email="${u.email || ''}">
                          <i class="fas fa-envelope" style="color: #38bdf8;"></i>
                          <p class="label">Change Email</p>
                        </li>
                        ${!u.isAdmin ? `
                        <li class="element ban-btn" data-user="${u.id}" data-banned="${u.isBanned}">
                          <i class="fas ${banBtnIcon}" style="color: ${banBtnColor};"></i>
                          <p class="label">${banBtnLabel}</p>
                        </li>
                        ` : ''}
                      </ul>
                      <div class="separator"></div>
                      <ul class="list">
                        <li class="element delete-comments-btn" data-user="${u.id}" data-username="${u.username}">
                          <i class="fas fa-comments" style="color: #f59e0b;"></i>
                          <p class="label">Wipe Comments</p>
                        </li>
                        ${!u.isAdmin ? `
                        <li class="element delete-user-btn delete" data-user="${u.id}" data-username="${u.username}">
                          <i class="fas fa-trash" style="color: #ef4444;"></i>
                          <p class="label">Delete User</p>
                        </li>
                        ` : ''}
                      </ul>
                    </div>
                  </div>
              </div>
            </div>
            ${u.isBanned && u.banReason ? `<div style="font-size:0.75rem; color: rgba(239,68,68,0.8); margin-bottom:10px;"><i class="fas fa-circle-exclamation" style="margin-right:4px;"></i>Reason: ${u.banReason}</div>` : ''}
            ${!u.isBanned && !u.isAdmin ? `
            <div class="ban-reason-row" id="ban-reason-row-${u.id}" style="display:none; margin-bottom:12px;">
              <div style="display:flex; gap:8px;">
                <input type="text" placeholder="Ban reason (optional)" maxlength="200" id="ban-reason-input-${u.id}" style="flex:1; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 0.8rem; font-family: inherit;">
                <button class="confirm-ban-btn" data-user="${u.id}" style="background: #ef4444; border: none; color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer;">Confirm</button>
                <button class="cancel-ban-btn" data-user="${u.id}" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">Cancel</button>
              </div>
            </div>` : ''}
            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
              ${badgePills}
            </div>
          </div>`;
      }).join('');

      // Add user checkbox event listeners
      container.querySelectorAll('.user-checkbox').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) selectedUsers.add(String(cb.dataset.user));
          else selectedUsers.delete(String(cb.dataset.user));
          updateUsersBulkBar();
        });
      });

      // --- Ban button ---
      container.querySelectorAll('.ban-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const isBanned = btn.dataset.banned === 'true';
          if (isBanned) {
            const ok = await showConfirmModal('Unban User', 'Unban this user?');
            if (!ok) return;
            await doBan(userId, false, '');
          } else {
            const row = document.getElementById('ban-reason-row-' + userId);
            if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
          }
        });
      });

      // --- VIP button (Supports target admins!) ---
      container.querySelectorAll('.vip-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const isVip = btn.dataset.vip === 'true';
          const targetStatus = !isVip;

          let expiresAt = null;
          if (targetStatus) {
            const durationInput = await showPromptModal('VIP Status Duration', 'Enter VIP duration in days (Enter 0 or leave empty for Permanent):', '30', '30');
            if (durationInput === null) return;
            const days = parseInt(durationInput.trim(), 10);
            if (durationInput.trim() !== "" && !isNaN(days) && days > 0) {
              const expiryDate = new Date(Date.now() + days * 24 * 60 * 60 * 1000);
              expiresAt = expiryDate.toISOString();
            } else if (durationInput.trim() !== "" && (isNaN(days) || days < 0)) {
              Toast.show("Invalid number of days entered.", "error");
              return;
            }
          } else {
            const ok = await showConfirmModal('Remove VIP Status', 'Remove VIP status from this user?');
            if (!ok) return;
          }

          try {
            const res = await API.toggleVip(userId, targetStatus, expiresAt);
            if (res.success) {
              const u = allUsers.find(x => x.id == userId);
              if (u) {
                u.isVip = targetStatus;
                u.vipExpiresAt = res.vipExpiresAt;
                u.badges = u.badges || [];
                if (targetStatus) {
                  if (!u.badges.includes('vip')) u.badges.push('vip');
                } else {
                  u.badges = u.badges.filter(b => b !== 'vip');
                }
                renderUsers();
              }
              Toast.show(`VIP status updated successfully`, 'success');
              loadAuditLogs();
            }
          } catch (err) {
            Toast.show(err.error || 'Failed to update VIP status', 'error');
          }
        });
      });

      // --- Change email button ---
      container.querySelectorAll('.change-email-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const username = btn.dataset.username;
          const currentEmail = btn.dataset.email;

          const newEmail = await showPromptModal('Change User Email', `Enter new email address for @${username}:`, 'user@example.com', currentEmail);
          if (newEmail === null) return;
          if (!newEmail.trim() || !newEmail.includes('@')) {
            Toast.show('Please enter a valid email address.', 'error');
            return;
          }

          try {
            const res = await API.updateUserEmail(userId, newEmail.trim());
            if (res.success) {
              const u = allUsers.find(x => x.id == userId);
              if (u) {
                u.email = res.email;
                u.isVerified = true;
                renderUsers();
              }
              Toast.show(`Email updated for @${username}!`, 'success');
              loadAuditLogs();
            }
          } catch (err) {
            Toast.show(err.error || 'Failed to update user email', 'error');
          }
        });
      });

      // Wipe comments (Supports target admins!)
      container.querySelectorAll('.delete-comments-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const username = btn.dataset.username;

          const ok = await showConfirmModal('Wipe User Comments', `Delete all comments posted by "${username}"?\n\nThis cannot be undone.`);
          if (!ok) return;

          try {
            await API.wipeComments(userId);
            Toast.show(`All comments by ${username} deleted successfully`, "success");
            loadAuditLogs();
          } catch (err) {
            console.error(err);
            Toast.show(err.error || "Failed to delete comments", "error");
          }
        });
      });

      container.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const username = btn.dataset.username;

          const ok = await showConfirmModal('Delete User Account', `Permanently delete "${username}"?\n\nThis action cannot be undone.`);
          if (!ok) return;

          try {
            await API.deleteUser(userId);
            allUsers = allUsers.filter(u => u.id != userId);
            renderUsers();
            loadAuditLogs();
            Toast.show(`${username} deleted successfully`, "success");
          } catch (err) {
            console.error(err);
            Toast.show(err.error || "Failed to delete user", "error");
          }
        });
      });

      container.querySelectorAll('.confirm-ban-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const reason = document.getElementById('ban-reason-input-' + userId)?.value.trim() || '';
          await doBan(userId, true, reason);
        });
      });

      container.querySelectorAll('.cancel-ban-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.user;
          const row = document.getElementById('ban-reason-row-' + userId);
          if (row) row.style.display = 'none';
        });
      });

      // Badge pills (Supports target admins!)
      container.querySelectorAll('.badge-pill').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const badgeId = btn.dataset.badge;
          const user = allUsers.find(u => u.id == userId);
          if (!user) return;

          let badges = [...(user.badges || [])];
          if (badges.includes(badgeId)) {
            badges = badges.filter(b => b !== badgeId);
          } else {
            badges.push(badgeId);
          }

          try {
            await API.setBadges(userId, badges);
            user.badges = badges;
            renderUsers();
            loadAuditLogs();
            Toast.show(`Badges updated for ${user.username}`, 'success');
          } catch (err) {
            console.error(err);
            Toast.show(err.error || 'Failed to update badges', 'error');
          }
        });
      });

      // Actions dropdown toggle
      container.querySelectorAll('.actions-trigger-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const userId = btn.dataset.user;
          const dd = document.getElementById('actions-dropdown-' + userId);
          if (!dd) return;
          
          document.querySelectorAll('.actions-dropdown-card').forEach(x => {
            if (x.id !== dd.id) x.style.display = 'none';
          });
          
          dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
        });
      });
    }

    /* ── Bulk Actions for Users ── */
    document.getElementById('btn-bulk-vip').addEventListener('click', async () => {
      const ids = Array.from(selectedUsers).map(id => parseInt(id, 10));
      if (!ids.length) return;
      const ok = await showConfirmModal('Bulk Grant VIP', `Grant VIP status to ${ids.length} selected user(s)?`);
      if (!ok) return;
      try {
        await API.bulkToggleVip(ids, true);
        Toast.show(`VIP granted for ${ids.length} user(s)`, 'success');
        selectedUsers.clear();
        loadUsers();
        loadAuditLogs();
      } catch (err) {
        Toast.show(err.error || 'Bulk VIP failed', 'error');
      }
    });

    document.getElementById('btn-bulk-unvip').addEventListener('click', async () => {
      const ids = Array.from(selectedUsers).map(id => parseInt(id, 10));
      if (!ids.length) return;
      const ok = await showConfirmModal('Bulk Remove VIP', `Remove VIP status from ${ids.length} selected user(s)?`);
      if (!ok) return;
      try {
        await API.bulkToggleVip(ids, false);
        Toast.show(`VIP removed for ${ids.length} user(s)`, 'success');
        selectedUsers.clear();
        loadUsers();
        loadAuditLogs();
      } catch (err) {
        Toast.show(err.error || 'Bulk remove VIP failed', 'error');
      }
    });

    document.getElementById('btn-bulk-wipe-comments').addEventListener('click', async () => {
      const ids = Array.from(selectedUsers).map(id => parseInt(id, 10));
      if (!ids.length) return;
      const ok = await showConfirmModal('Bulk Wipe Comments', `Wipe all authored comments for ${ids.length} selected user(s)?\n\nThis cannot be undone.`);
      if (!ok) return;
      try {
        await API.bulkWipeComments(ids);
        Toast.show(`Wiped comments for ${ids.length} user(s)`, 'success');
        selectedUsers.clear();
        loadUsers();
        loadAuditLogs();
      } catch (err) {
        Toast.show(err.error || 'Bulk wipe comments failed', 'error');
      }
    });

    async function doBan(userId, banned, reason) {
      const user = allUsers.find(u => u.id == userId);
      try {
        await API.banUser(userId, banned, reason);
        if (user) {
          user.isBanned = banned;
          user.banReason = banned ? reason || 'No reason provided.' : '';
        }
        renderUsers();
        loadAuditLogs();
        Toast.show(`User ${banned ? 'banned' : 'unbanned'} successfully`, banned ? 'error' : 'success');
      } catch (err) {
        console.error(err);
        Toast.show(err.error || 'Failed to update ban status', 'error');
      }
    }

    // Search input listener
    document.getElementById('users-search').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      visibleCount = 10;
      renderUsers();
    });

    // Load more listener
    document.getElementById('users-load-more').addEventListener('click', () => {
      visibleCount += 10;
      renderUsers();
    });

    /* ── Audit Logs System ── */
    async function loadAuditLogs() {
      const tbody = document.getElementById('audit-logs-tbody');
      if (!tbody) return;
      try {
        const res = await API.getAuditLogs();
        const logs = res.logs || [];
        tbody.innerHTML = '';

        if (!logs.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="padding: 1rem; text-align: center; color: rgba(255,255,255,0.4);">No audit logs recorded yet</td></tr>';
          return;
        }

        logs.forEach(l => {
          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
          const date = new Date(l.createdAt).toLocaleString();
          
          let actionColor = '#34C27A';
          let actionBg = 'rgba(52,194,122,0.12)';
          if (l.action.includes('DELETE') || l.action.includes('BAN')) {
            actionColor = '#ef4444';
            actionBg = 'rgba(239,68,68,0.12)';
          } else if (l.action.includes('WIPE') || l.action.includes('REMOVE')) {
            actionColor = '#f59e0b';
            actionBg = 'rgba(245,158,11,0.12)';
          }

          const target = l.targetUsername ? `<a href="/${l.targetUsername}" target="_blank" style="color:#ECEEE9; font-weight:600;">@${l.targetUsername}</a>` : (l.targetUserId ? `ID: ${l.targetUserId}` : '-');

          tr.innerHTML = `
            <td style="padding: 1rem; color: #8B9089; font-size: 0.82rem;">${date}</td>
            <td style="padding: 1rem; font-weight: 600; color: #ECEEE9;">@${l.adminUsername}</td>
            <td style="padding: 1rem;">
              <span class="action-tag" style="background:${actionBg}; color:${actionColor}; border:1px solid ${actionColor}40;">
                ${l.action}
              </span>
            </td>
            <td style="padding: 1rem;">${target}</td>
            <td style="padding: 1rem; color: #ECEEE9; font-size: 0.85rem;">${l.details || '-'}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error('Failed to load audit logs:', err);
      }
    }

    document.getElementById('btn-refresh-audit').addEventListener('click', loadAuditLogs);

    // Global click-away listener to close dropdowns
    document.addEventListener('click', (e) => {
      document.querySelectorAll('.actions-dropdown-card').forEach(dd => {
        const trigger = dd.parentElement?.querySelector('.actions-trigger-btn');
        if (trigger && !trigger.contains(e.target) && !dd.contains(e.target)) {
          dd.style.display = 'none';
        }
      });
    });

    loadUsers();
    loadAuditLogs();
  </script>
</body>
</html>
