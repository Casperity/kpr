<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | kpr.lol</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/dashboard.css">
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>
  <!-- Navigation -->
  <nav class="dash-nav">
    <a href="/" class="dash-nav-brand">kpr<span>.lol</span></a>
    <div class="dash-nav-actions">
      <a href="/dashboard" class="dash-nav-link">Dashboard</a>
      <a href="/admin" class="dash-nav-link active">Admin</a>
      <button class="btn-logout" id="btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="dash-content" style="max-width: 1000px; margin: 0 auto; display: block;">
    
    <div class="dash-section" id="section-invites" style="margin-bottom: 2rem;">
      <div class="dash-section-header collapsed">
        <div class="dash-section-title">
          <i class="fas fa-ticket-alt"></i> Invite Codes
        </div>
      </div>
      <div class="dash-section-body" style="display: block;">
        
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
          <input type="number" id="invite-count" class="form-input" value="5" min="1" max="50" style="width: 100px;">
          <button id="btn-generate" class="btn-save" style="width: auto;">Generate Codes</button>
        </div>

        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                <th style="padding: 1rem;">Code</th>
                <th style="padding: 1rem;">Status</th>
                <th style="padding: 1rem;">Used By</th>
                <th style="padding: 1rem;">Created</th>
                <th style="padding: 1rem;">Actions</th>
              </tr>
            </thead>
            <tbody id="invites-tbody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="dash-section" id="section-users" style="margin-bottom: 2rem;">
      <div class="dash-section-header">
        <div class="dash-section-title">
          <i class="fas fa-users"></i> Users & Badges
        </div>
      </div>
      <div class="dash-section-body" style="display: block;">
        <div id="users-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </div>

  </div>

  <script src="/api.js"></script>
  <script>
    if (!API.isLoggedIn()) {
      window.location.href = '/login';
    }

    // Nav
    document.getElementById('btn-logout').addEventListener('click', () => {
      API.logout();
      window.location.href = '/login';
    });

    /* ── Badge Catalog (matches backend + profile renderer) ── */
    const BADGE_CATALOG = {
      dev:         { icon: 'fas fa-code',            label: 'Developer',    color: '#a78bfa' },
      og:          { icon: 'fas fa-crown',           label: 'OG',           color: '#facc15' },
      supporter:   { icon: 'fas fa-heart',           label: 'Supporter',    color: '#f472b6' },
      vip:         { icon: 'fas fa-gem',             label: 'VIP',          color: '#38bdf8' },
      verified:    { icon: 'fas fa-circle-check',    label: 'Verified',     color: '#4ade80' },
      staff:       { icon: 'fas fa-shield-halved',   label: 'Staff',        color: '#fb923c' },
      beta:        { icon: 'fas fa-flask',           label: 'Beta Tester',  color: '#c084fc' },
      contributor: { icon: 'fas fa-code-branch',     label: 'Contributor',  color: '#34d399' },
      partner:     { icon: 'fas fa-handshake',       label: 'Partner',      color: '#fbbf24' },
      donor:       { icon: 'fas fa-dollar-sign',     label: 'Donor',        color: '#22d3ee' },
      bughunter:   { icon: 'fas fa-bug',             label: 'Bug Hunter',   color: '#0CE600' },
    };

    // Load invites
    async function loadInvites() {
      try {
        const data = await API.getInvites();
        const tbody = document.getElementById('invites-tbody');
        tbody.innerHTML = '';

        if (!data.invites || data.invites.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="padding: 1rem; text-align: center; color: rgba(255,255,255,0.5);">No invite codes found</td></tr>';
          return;
        }

        data.invites.forEach(inv => {
          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
          
          const statusColor = inv.isUsed ? 'rgba(255,255,255,0.3)' : '#4ade80';
          const statusText = inv.isUsed ? 'Used' : 'Available';

          const usedBy = inv.usedBy ? `<a href="/${inv.usedBy}" target="_blank" style="color: var(--accent);">${inv.usedBy}</a>` : '-';
          
          const date = new Date(inv.createdAt).toLocaleDateString();

          tr.innerHTML = `
            <td style="padding: 1rem; font-family: monospace;">${inv.code}</td>
            <td style="padding: 1rem;">
              <span style="background: ${statusColor}; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">
                ${statusText}
              </span>
            </td>
            <td style="padding: 1rem;">${usedBy}</td>
            <td style="padding: 1rem; color: rgba(255,255,255,0.5);">${date}</td>
            <td style="padding: 1rem;">
              <button onclick="copyCode('${inv.code}')" style="background: none; border: none; color: #fff; cursor: pointer; margin-right: 10px;" title="Copy">
                <i class="fas fa-copy"></i>
              </button>
              ${!inv.isUsed ? `
              <button onclick="deleteCode('${inv.code}')" style="background: none; border: none; color: #ef4444; cursor: pointer;" title="Delete">
                <i class="fas fa-trash"></i>
              </button>
              ` : ''}
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        if (err.status === 403) {
          document.body.innerHTML = '<h1 style="color: white; text-align: center; margin-top: 20vh;">Access Denied. Admins Only.</h1>';
        } else {
          console.error(err);
        }
      }
    }

    document.getElementById('btn-generate').addEventListener('click', async () => {
      const count = parseInt(document.getElementById('invite-count').value) || 1;
      try {
        await API.createInvites(count);
        loadInvites();
        Toast.show(`Generated ${count} code(s)`, 'success');
      } catch (err) {
        console.error(err);
        Toast.show('Failed to generate codes', 'error');
      }
    });

    window.copyCode = (code) => {
      navigator.clipboard.writeText(code);
      Toast.show('Copied to clipboard', 'success');
    };

    window.deleteCode = async (code) => {
      if (!confirm(`Delete code ${code}?`)) return;
      try {
        await API.deleteInvite(code);
        loadInvites();
        Toast.show('Code deleted', 'success');
      } catch (err) {
        console.error(err);
        Toast.show('Failed to delete code', 'error');
      }
    };

    loadInvites();

    /* ── Users & Badges ──────────────────────────────── */
    let allUsers = [];
    let allowedBadges = Object.keys(BADGE_CATALOG);

    async function loadUsers() {
      try {
        const data = await API.getUsers();
        allUsers = data.users || [];
        if (data.allowedBadges) allowedBadges = data.allowedBadges;
        renderUsers();
      } catch (err) {
        if (err.status === 403) return;
        console.error(err);
      }
    }

    function renderUsers() {
      const container = document.getElementById('users-list');
      if (!allUsers.length) {
        container.innerHTML = '<div style="color: rgba(255,255,255,0.4); text-align: center; padding: 1rem;">No users found</div>';
        return;
      }
      container.innerHTML = allUsers.map(u => {
        const userBadges = u.badges || [];
        const badgePills = allowedBadges.map(id => {
          const b = BADGE_CATALOG[id] || { icon: 'fas fa-certificate', label: id, color: '#888' };
          const active = userBadges.includes(id);
          return `<button class="badge-pill ${active ? 'active' : ''}" data-user="${u.id}" data-badge="${id}" style="--badge-color: ${b.color};" title="${b.label}"><i class="${b.icon}"></i></button>`;
        }).join('');

        const banBtnLabel = u.isBanned ? 'Unban' : 'Ban';
        const banBtnColor = u.isBanned ? '#4ade80' : '#ef4444';
        const banBtnIcon = u.isBanned ? 'fa-lock-open' : 'fa-ban';
        const banInfo = u.isBanned
          ? `<span style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; margin-left: 6px;" title="Reason: ${u.banReason || 'N/A'}">BANNED</span>`
          : '';

        return `
          <div style="background: rgba(255,255,255,0.03); border: 1px solid ${u.isBanned ? 'rgba(239,68,68,0.25)' : 'rgba(255,255,255,0.06)'}; border-radius: 14px; padding: 14px 18px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
              <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                <a href="/${u.username}" target="_blank" style="color: #fff; text-decoration: none; font-weight: 600;">${u.username}</a>
                ${u.displayName ? `<span style="color: rgba(255,255,255,0.35);">${u.displayName}</span>` : ''}
                ${u.isAdmin ? '<span style="background: #fb923c; color: #000; padding: 1px 6px; border-radius: 8px; font-size: 0.7rem; font-weight: 600;">ADMIN</span>' : ''}
                ${u.isVip ? '<span style="background: #a78bfa; color: #000; padding: 1px 6px; border-radius: 8px; font-size: 0.7rem; font-weight: 600;">VIP</span>' : ''}
                ${banInfo}
              </div>
              <div style="display:flex; align-items:center; gap:8px;">
                  <span style="color: rgba(255,255,255,0.2); font-size: 0.72rem;">ID: ${u.id}</span>
              
                  ${
                    !u.isAdmin
                      ? `
                      <button class="vip-btn"
                          data-user="${u.id}"
                          data-vip="${u.isVip}"
                          style="background:rgba(255,255,255,0.05);border:1px solid ${u.isVip ? '#ef4444' : '#a78bfa'}33;color:${u.isVip ? '#ef4444' : '#a78bfa'};padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;">
                          <i class="fas fa-crown" style="margin-right:4px;"></i>${u.isVip ? 'Remove VIP' : 'Give VIP'}
                      </button>

                      <button class="ban-btn"
                          data-user="${u.id}"
                          data-banned="${u.isBanned}"
                          style="background:rgba(255,255,255,0.05);border:1px solid ${banBtnColor}33;color:${banBtnColor};padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;">
                          <i class="fas ${banBtnIcon}" style="margin-right:4px;"></i>${banBtnLabel}
                      </button>
              
                      <button class="delete-user-btn"
                          data-user="${u.id}"
                          data-username="${u.username}"
                          style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;">
                          <i class="fas fa-trash" style="margin-right:4px;"></i>Delete
                      </button>
                      `
                      : ""
                  }
              </div>
            </div>
            ${u.isBanned && u.banReason ? `<div style="font-size:0.75rem; color: rgba(239,68,68,0.7); margin-bottom:8px;"><i class="fas fa-circle-exclamation" style="margin-right:4px;"></i>Reason: ${u.banReason}</div>` : ''}
            ${!u.isBanned && !u.isAdmin ? `
            <div class="ban-reason-row" id="ban-reason-row-${u.id}" style="display:none; margin-bottom:10px;">
              <div style="display:flex; gap:8px;">
                <input type="text" placeholder="Ban reason (optional)" maxlength="200" id="ban-reason-input-${u.id}" style="flex:1; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 0.8rem; font-family: inherit;">
                <button class="confirm-ban-btn" data-user="${u.id}" style="background: #ef4444; border: none; color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer;">Confirm</button>
                <button class="cancel-ban-btn" data-user="${u.id}" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">Cancel</button>
              </div>
            </div>` : ''}
            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
              ${badgePills}
            </div>
          </div>`;
      }).join('');
 
      // --- Ban button: show reason row or unban directly ---
      container.querySelectorAll('.ban-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const isBanned = btn.dataset.banned === 'true';
          if (isBanned) {
            // Unban directly
            if (!confirm('Unban this user?')) return;
            await doBan(userId, false, '');
          } else {
            // Show reason input
            const row = document.getElementById('ban-reason-row-' + userId);
            if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
          }
        });
      });

      // --- VIP button: toggle VIP status ---
      container.querySelectorAll('.vip-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const isVip = btn.dataset.vip === 'true';
          const targetStatus = !isVip;
          if (!confirm(`${targetStatus ? 'Give' : 'Remove'} VIP status ${targetStatus ? 'to' : 'from'} this user?`)) return;

          try {
            const res = await API.request('/api/admin/users/' + userId + '/vip', {
              method: 'PUT',
              body: JSON.stringify({ isVip: targetStatus })
            });
            if (res.success) {
              const u = allUsers.find(x => x.id == userId);
              if (u) {
                u.isVip = targetStatus;
                renderUsers();
              }
              Toast.show(`VIP status updated successfully`, 'success');
            }
          } catch (err) {
            Toast.show(err.error || 'Failed to update VIP status', 'error');
          }
        });
      });

      container.querySelectorAll('.delete-user-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
              const userId = btn.dataset.user;
              const username = btn.dataset.username;
      
              if (!confirm(`Delete "${username}"?\n\nThis cannot be undone.`))
                  return;
      
              try {
                  await API.request(`/api/admin/users/${userId}`, {
                      method: "DELETE"
                  });
      
                  allUsers = allUsers.filter(u => u.id != userId);
                  renderUsers();
      
                  Toast.show(`${username} deleted successfully`, "success");
              } catch (err) {
                  console.error(err);
                  Toast.show(err.error || "Failed to delete user", "error");
              }
          });
      });

      container.querySelectorAll('.confirm-ban-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const reason = document.getElementById('ban-reason-input-' + userId)?.value.trim() || '';
          await doBan(userId, true, reason);
        });
      });

      container.querySelectorAll('.cancel-ban-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.user;
          const row = document.getElementById('ban-reason-row-' + userId);
          if (row) row.style.display = 'none';
        });
      });

      // --- Badge pills ---
      container.querySelectorAll('.badge-pill').forEach(btn => {
        btn.addEventListener('click', async () => {
          const userId = btn.dataset.user;
          const badgeId = btn.dataset.badge;
          const user = allUsers.find(u => u.id == userId);
          if (!user) return;

          let badges = [...(user.badges || [])];
          if (badges.includes(badgeId)) {
            badges = badges.filter(b => b !== badgeId);
          } else {
            badges.push(badgeId);
          }

          try {
            await API.request('/api/admin/users/' + userId + '/badges', {
              method: 'PUT',
              body: JSON.stringify({ badges })
            });
            user.badges = badges;
            renderUsers();
            Toast.show(`Badges updated for ${user.username}`, 'success');
          } catch (err) {
            console.error(err);
            Toast.show(err.error || 'Failed to update badges', 'error');
          }
        });
      });
    }

    async function doBan(userId, banned, reason) {
      const user = allUsers.find(u => u.id == userId);
      try {
        await API.request('/api/admin/users/' + userId + '/ban', {
          method: 'PUT',
          body: JSON.stringify({ banned, reason })
        });
        if (user) {
          user.isBanned = banned;
          user.banReason = banned ? reason || 'No reason provided.' : '';
        }
        renderUsers();
        Toast.show(`User ${banned ? 'banned' : 'unbanned'} successfully`, banned ? 'error' : 'success');
      } catch (err) {
        console.error(err);
        Toast.show(err.error || 'Failed to update ban status', 'error');
      }
    }

    loadUsers();
  </script>
</body>
</html>
