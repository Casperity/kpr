<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kpr.lol</title>
  <meta property="og:title" content="Kspr" />
  <meta property="og:description" content="@ya_wns on cord | greetings" />
  <meta property="og:image" content="/signal.png" />
  <meta name="theme-color" content="#0f0f11" />
  <meta name="twitter:card" content="summary_large_image" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="intro-container">
    <video id="intro-video" src="intro.mp4" preload="auto" playsinline></video>
    <div id="click-overlay">Click</div>
  </div>

  <div id="main-page">
    <div class="bio-container">
      <img src="pfp.jpg" alt="Profile Picture" class="bio-pfp">
      <h1 class="bio-username">Yawns</h1>
      
      <div class="bio-details">
        <span class="bio-badge">he/him</span>
        <span class="bio-badge">Kspr, Josh</span>
      </div>
      
      <p class="bio-text">
        This is my bio. Put whatever you want here about yourself.
      </p>

      <div class="music-player">
        <img id="music-cover" src="" alt="Album Cover">
        <div class="music-info">
          <div id="music-title">Select a song</div>
          <div id="music-artist"></div>
        </div>
        <div class="music-controls">
          <button id="prev-btn"><i class="fas fa-backward"></i></button>
          <button id="play-btn"><i class="fas fa-play"></i></button>
          <button id="next-btn"><i class="fas fa-forward"></i></button>
        </div>
        <div class="volume-control">
          <i class="fas fa-volume-up"></i>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <audio id="audio" preload="metadata"></audio>
      </div>
    </div>
  </div>

  <script>
    const introContainer = document.getElementById('intro-container');
    const introVideo = document.getElementById('intro-video');
    const clickOverlay = document.getElementById('click-overlay');
    const mainPage = document.getElementById('main-page');

    clickOverlay.addEventListener('click', () => {
      clickOverlay.style.opacity = '0';
      clickOverlay.style.pointerEvents = 'none';
      
      introVideo.classList.add('unblurred');
      introVideo.play().catch(e => console.log('Playback failed:', e));
    });

    function skipIntro() {
      introVideo.pause();
      introContainer.style.opacity = '0';
      introContainer.style.pointerEvents = 'none';
      mainPage.style.opacity = '1';
      mainPage.style.pointerEvents = 'auto';
      
      setTimeout(() => {
        introContainer.style.display = 'none';
        playSong();
      }, 1500);
    }

    introVideo.addEventListener('ended', skipIntro);
    introContainer.addEventListener('dblclick', skipIntro);

    const songs = [
      {
        title: "Wildhard",
        artist: "plaxz, kelestiial",
        src: "songshit/Efas/wildhard by plaxz.wav",
        cover: "songshit/Efas/plaxz.png"
      },
      {
        title: "My Jealousy",
        artist: "vivi baby, ovg!",
        src: "songshit/MY JEALOUSY.mp3",
        cover: "songshit/fat.png"
      },
      {
        title: "plz excuse my proper swag",
        artist: "backw666s, morgue",
        src: "songshit/morgue/plz excuse my proper.mp3",
        cover: "songshit/morgue/excuseme.png"
      },
      {
        title: "teach me how 2 swag",
        artist: "blair, morgue, backw666s",
        src: "songshit/morgue/teach me how 2 swag.mp3",
        cover: "songshit/morgue/swag.png"
      },
      {
        title: "love the way I lover",
        artist: "never goodbye, nicosbands",
        src: "songshit/nivo/love the way I lover.mp3",
        cover: "songshit/nivo/ban.png"
      },
      {
        title: "24h",
        artist: "5L, safe 'n' sound",
        src: "songshit/phsio/24h.mp3",
        cover: "songshit/phsio/image.png"
      }
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const musicTitle = document.getElementById('music-title');
    const musicArtist = document.getElementById('music-artist');
    const musicCover = document.getElementById('music-cover');
    const volumeSlider = document.getElementById('volume-slider');

    let currentSongIndex = 0;
    audio.volume = 0.5;

    volumeSlider.addEventListener('input', (e) => {
      audio.volume = e.target.value;
    });

    function loadSong(song) {
      musicTitle.textContent = song.title;
      musicArtist.textContent = song.artist;
      musicCover.src = song.cover || '';
      audio.src = song.src;
    }

    function playSong() {
      playBtn.innerHTML = '<i class="fas fa-pause"></i>';
      audio.play();
    }

    function pauseSong() {
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
      audio.pause();
    }

    function playPause() {
      if (audio.paused) {
        playSong();
      } else {
        pauseSong();
      }
    }

    function nextSong() {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      loadSong(songs[currentSongIndex]);
      playSong();
    }

    function prevSong() {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      loadSong(songs[currentSongIndex]);
      playSong();
    }

    playBtn.addEventListener('click', playPause);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);
    audio.addEventListener('ended', nextSong);

    loadSong(songs[0]);
  </script>
</body>
</html>
