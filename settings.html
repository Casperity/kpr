<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | kpr.lol</title>
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    .settings-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    .settings-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .settings-sub {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.38);
      margin-bottom: 36px;
    }

    .settings-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .settings-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,1);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .danger-card {
      background: rgba(239,68,68,0.04);
      border-color: rgba(239,68,68,0.18);
    }

    .danger-card .settings-card-title {
      color: rgba(239,68,68,0.6);
    }

    .settings-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 24px 0;
    }

    .btn-settings-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #00c8ff, #0af);
      color: #010409;
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-settings-primary:hover { opacity: 0.85; }
    .btn-settings-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-settings-danger {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 26px;
      border-radius: 12px;
      border: 1px solid rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.08);
      color: #ef4444;
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-top: 20px;
    }
    .btn-settings-danger:hover {
      background: rgba(239,68,68,0.16);
      border-color: rgba(239,68,68,0.6);
    }
    .btn-settings-danger:disabled { opacity: 0.5; cursor: not-allowed; }

    .danger-desc {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.38);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    /* --- Frutiger Button --- */
    .frutiger-button {
      cursor: pointer;
      position: relative;
      padding: 2px;
      border-radius: 6px;
      border: 0;
      text-shadow: 1px 1px #000a;
      background: linear-gradient(#006caa, #00c3ff);
      box-shadow: 0px 4px 6px 0px #0008;
      transition: 0.3s all;
      display: inline-block;
      overflow: hidden;
      flex-shrink: 0;
      height: 38px;
    }

    .frutiger-button:hover {
      box-shadow: 0px 6px 12px 0px #0009;
    }

    .frutiger-button:active {
      box-shadow: 0px 0px 0px 0px #0000;
    }

    .frutiger-button .inner {
      position: relative;
      inset: 0px;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: radial-gradient(circle at 50% 100%, #30f8f8 10%, #30f8f800 55%),
        linear-gradient(#00526a, #009dcd);
      overflow: hidden;
      transition: inherit;
    }

    .frutiger-button .inner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(-65deg, #0000 40%, #fff7 50%, #0000 70%);
      background-size: 200% 100%;
      background-repeat: no-repeat;
      animation: thing 3s ease infinite;
    }

    @keyframes thing {
      0% {
        background-position: 130%;
        opacity: 1;
      }

      to {
        background-position: -166%;
        opacity: 0;
      }
    }

    .frutiger-button .top-white {
      position: absolute;
      border-radius: inherit;
      inset: 0 -8em;
      background: radial-gradient(
        circle at 50% -270%,
        #fff 45%,
        #fff6 60%,
        #fff0 60%
      );
      transition: inherit;
    }

    .frutiger-button .inner::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transition: inherit;
      box-shadow: inset 0px 2px 8px -2px #0000;
    }

    .frutiger-button:active .inner::after {
      box-shadow: inset 0px 2px 8px -2px #000a;
    }

    .frutiger-button .text {
      position: relative;
      z-index: 1;
      color: white;
      font-weight: 550;
      transition: inherit;
      font-size: 0.82rem;
      line-height: 1;
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="dash-nav">
    <a href="/" class="dash-nav-brand">kpr<span>.lol</span></a>
    <div class="dash-nav-actions">
      <a href="/dashboard" class="dash-nav-link">
        <i class="fas fa-arrow-left" style="margin-right:4px;font-size:0.75rem;"></i> Dashboard
      </a>
      <a href="/settings" class="dash-nav-link active">
        <i class="fas fa-gear" style="margin-right:4px;"></i> Settings
      </a>
      <button class="btn-logout" id="btn-logout">
        <i class="fas fa-sign-out-alt" style="margin-right:4px;"></i> Logout
      </button>
    </div>
  </nav>

  <div class="settings-wrap">
    <div class="settings-heading">Account Settings</div>
    <div class="settings-sub">Manage your password and account.</div>

    <!-- Change Username -->
    <div class="settings-card">
      <div class="settings-card-title">Change Username</div>

      <div class="form-group">
        <label class="form-label" style="display: flex; align-items: center; gap: 6px;">
          New Username <span style="font-size: 0.72rem; opacity: 0.8; background: rgba(14, 165, 233, 0.15); color: #0ea5e9; padding: 2px 6px; border-radius: 6px; font-weight: 500;">Once every 30 days</span>
        </label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input type="text" class="form-input" id="input-username" placeholder="newusername" maxlength="20" style="flex: 1;" />
          <button class="frutiger-button" id="btn-change-username">
            <div class="inner">
              <div class="top-white"></div>
              <span class="text">Change</span>
            </div>
          </button>
        </div>
        <div class="form-hint" id="username-hint" style="margin-top: 8px;">Your current username is <span id="current-username-text" style="color: #fff; font-weight: 600;"></span></div>
      </div>
    </div>

    <!-- Minecraft Cosmetics Integration -->
    <div class="settings-card">
      <div class="settings-card-title">Minecraft Cosmetics Integration</div>
      <div class="form-group">
        <label class="form-label">Minecraft Username</label>
        <input type="text" class="form-input" id="input-mc-username" placeholder="MinecraftUsername" />
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label class="form-label">Minecraft UUID</label>
        <input type="text" class="form-input" id="input-mc-uuid" placeholder="87e8adf4-0000-0000-0000-000000000000" />
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label class="form-label">Equipped Custom Cosmetics (JSON List)</label>
        <textarea class="form-input" id="input-mc-cosmetics" rows="6" placeholder='[
  {
    "id": "twerk",
    "slot": "EMOTE",
    "tier": "EPIC",
    "displayNames": {
      "en_us": "Twerk"
    },
    "files": {
      "animations.json": {
        "url": "https://kpr.lol/assets/twerk/animations.json",
        "checksum": "41CD9F0C71B08352C166849D59C25D4A9502A871494EE4A7A5F0E42DF3B14278"
      }
    }
  }
]' style="font-family: monospace; font-size: 0.82rem; background: rgba(0,0,0,0.2); color: #fff;"></textarea>
      </div>

      <div class="settings-divider" style="margin-top:28px; margin-bottom:24px;"></div>

      <button class="btn-settings-primary" id="btn-update-mc">
        <i class="fas fa-gamepad"></i> Save Minecraft Config
      </button>
    </div>

    <!-- Change Password -->
    <div class="settings-card">
      <div class="settings-card-title">Change Password</div>

      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" class="form-input" id="input-current-pw"
          placeholder="Enter your current password" autocomplete="current-password" />
      </div>

      <div class="settings-divider"></div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="input-new-pw"
          placeholder="At least 6 characters" autocomplete="new-password" />
      </div>
      <div class="form-group", style="margin-top:24px;">
        <label class="form-label">Confirm New Password</label>
        <input type="password" class="form-input" id="input-confirm-pw"
          placeholder="Repeat new password" autocomplete="new-password" />
      </div>

      <div class="settings-divider" style="margin-top:28px; margin-bottom:24px;"></div>

      <button class="btn-settings-primary" id="btn-change-pw">
        <i class="fas fa-key"></i> Update Password
      </button>
    </div>

    <!-- Danger Zone -->
    <div class="settings-card danger-card">
      <div class="settings-card-title">Danger Zone</div>
      <div class="danger-desc">
        Permanently deletes your account, profile, social links, and all associated data.
        This action <strong style="color:rgba(255,255,255,0.6);">cannot be undone.</strong>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm with your password</label>
        <input type="password" class="form-input" id="input-delete-pw"
          placeholder="Enter your password to continue"
          autocomplete="current-password"
          style="border-color:rgba(239,68,68,0.25);" />
      </div>
      <button class="btn-settings-danger" id="btn-delete-account">
        <i class="fas fa-trash-can"></i> Delete My Account
      </button>
    </div>
  </div>

  <!-- Toast container (injected by api.js) -->

  <script src="api.js"></script>
  <script>
    (function () {
      'use strict';

      // Auth guard
      if (!API.isLoggedIn()) {
        window.location.href = '/login';
        return;
      }

      const inputUsername = document.getElementById('input-username');
      const currentUsernameText = document.getElementById('current-username-text');
      const btnChangeUsername = document.getElementById('btn-change-username');
      let userData = null;

      // Load user data
      async function loadUserData() {
        try {
          const res = await API.getMe();
          userData = res.user || res;
          if (inputUsername) inputUsername.value = userData.username || '';
          if (currentUsernameText) currentUsernameText.textContent = userData.username || '';
        } catch (err) {
          console.error(err);
          const cached = API.getUser() || {};
          userData = cached;
          if (inputUsername) inputUsername.value = cached.username || '';
          if (currentUsernameText) currentUsernameText.textContent = cached.username || '';
        }
      }
      loadUserData();

      // ── Change Username ────────────────────────────────────────
      btnChangeUsername?.addEventListener('click', async () => {
        const username = inputUsername.value.trim();
        if (!username) {
          return Toast.show('Username cannot be empty', 'error');
        }

        if (username === userData.username) {
          return Toast.show('New username must be different from current username', 'error');
        }

        if (!confirm(`Are you sure you want to change your username to "${username}"?\nThis will change your profile link to kpr.lol/${username}.\nYou can only do this once every 30 days.`)) {
          return;
        }

        const textSpan = btnChangeUsername.querySelector('.text');
        btnChangeUsername.disabled = true;
        const oldText = textSpan ? textSpan.textContent : 'Change';
        if (textSpan) textSpan.textContent = 'Changing...';

        try {
          const res = await API.updateUsername(username);
          if (res.success) {
            API.setToken(res.token);
            
            const storedUser = API.getUser() || {};
            storedUser.username = res.username;
            API.setUser(storedUser);

            userData.username = res.username;
            currentUsernameText.textContent = res.username;
            inputUsername.value = res.username;

            Toast.show('Username updated successfully!', 'success');
          } else {
            Toast.show(res.error || 'Failed to update username', 'error');
          }
        } catch (err) {
          console.error(err);
          Toast.show(err.error || 'Failed to update username', 'error');
        } finally {
          btnChangeUsername.disabled = false;
          if (textSpan) textSpan.textContent = oldText;
        }
      });

      // ── Minecraft Cosmetics link ───────────────────────────────
      const inputMcUsername = document.getElementById('input-mc-username');
      const inputMcUuid = document.getElementById('input-mc-uuid');
      const inputMcCosmetics = document.getElementById('input-mc-cosmetics');
      const btnUpdateMc = document.getElementById('btn-update-mc');

      async function loadMinecraftLink() {
        try {
          const res = await API.getMinecraft();
          if (res.linked) {
            if (inputMcUsername) inputMcUsername.value = res.minecraftUsername || '';
            if (inputMcUuid) inputMcUuid.value = res.minecraftUuid || '';
            if (inputMcCosmetics) inputMcCosmetics.value = JSON.stringify(res.cosmetics, null, 2) || '[]';
          }
        } catch (err) {
          console.error('Failed to load Minecraft link:', err);
        }
      }
      loadMinecraftLink();

      btnUpdateMc?.addEventListener('click', async () => {
        const mcUsername = inputMcUsername.value.trim();
        const mcUuid = inputMcUuid.value.trim();
        let cosmeticsList = [];

        if (!mcUsername || !mcUuid) {
          return Toast.show('Minecraft Username and UUID are required.', 'error');
        }

        try {
          const val = inputMcCosmetics.value.trim();
          if (val) {
            cosmeticsList = JSON.parse(val);
          }
        } catch (e) {
          return Toast.show('Invalid JSON format in Equipped Custom Cosmetics.', 'error');
        }

        btnUpdateMc.disabled = true;
        btnUpdateMc.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        try {
          const res = await API.updateMinecraft(mcUuid, mcUsername, cosmeticsList);
          if (res.success) {
            Toast.show('Minecraft cosmetics updated successfully!', 'success');
          } else {
            Toast.show(res.error || 'Failed to update Minecraft cosmetics', 'error');
          }
        } catch (err) {
          Toast.show(err.error || err.message || 'Failed to update Minecraft cosmetics', 'error');
        } finally {
          btnUpdateMc.disabled = false;
          btnUpdateMc.innerHTML = '<i class="fas fa-gamepad"></i> Save Minecraft Config';
        }
      });

      // Logout
      document.getElementById('btn-logout').addEventListener('click', () => {
        API.logout();
        window.location.href = '/login';
      });

      // ── Change Password ────────────────────────────────────────
      document.getElementById('btn-change-pw').addEventListener('click', async () => {
        const currentPw = document.getElementById('input-current-pw').value;
        const newPw     = document.getElementById('input-new-pw').value;
        const confirmPw = document.getElementById('input-confirm-pw').value;

        if (!currentPw) return Toast.show('Enter your current password.', 'error');
        if (!newPw)     return Toast.show('Enter a new password.', 'error');
        if (newPw.length < 6) return Toast.show('New password must be at least 6 characters.', 'error');
        if (newPw !== confirmPw) return Toast.show('Passwords do not match.', 'error');

        const btn = document.getElementById('btn-change-pw');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating…';

        try {
          await API.request('/api/user/password', {
            method: 'PUT',
            body: JSON.stringify({ currentPassword: currentPw, newPassword: newPw })
          });
          Toast.show('Password updated! Logging you out…', 'success');
          document.getElementById('input-current-pw').value = '';
          document.getElementById('input-new-pw').value = '';
          document.getElementById('input-confirm-pw').value = '';
          setTimeout(() => { API.logout(); window.location.href = '/login'; }, 2000);
        } catch (err) {
          Toast.show(err.message || err.error || 'Failed to update password.', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-key"></i> Update Password';
        }
      });

      // ── Delete Account ─────────────────────────────────────────
      document.getElementById('btn-delete-account').addEventListener('click', async () => {
        const pw = document.getElementById('input-delete-pw').value;
        if (!pw) return Toast.show('Enter your password to confirm deletion.', 'error');

        const confirmed = window.confirm(
          'Are you absolutely sure?\n\nThis will permanently delete your account and all your data. There is no undo.'
        );
        if (!confirmed) return;

        const btn = document.getElementById('btn-delete-account');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting…';

        try {
          await API.request('/api/user/account', {
            method: 'DELETE',
            body: JSON.stringify({ password: pw })
          });
          API.clearToken();
          API.clearUser();
          Toast.show('Account deleted. Goodbye.', 'info', 3000);
          setTimeout(() => { window.location.href = '/'; }, 2500);
        } catch (err) {
          Toast.show(err.message || err.error || 'Failed to delete account.', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-trash-can"></i> Delete My Account';
        }
      });

    })();
  </script>

</body>
</html>
