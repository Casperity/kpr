<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kpr.lol</title>
  <meta name="theme-color" content="#0a0a0f" />
  <meta property="og:site_name" content="kpr.lol" />
  <meta property="og:title" content="kpr.lol" />
  <meta property="og:description" content="Bio link platform" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="profile.css" />
  <style>
    /* --- Enter Overlay --- */
    #enter-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }

    #enter-overlay.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #enter-click-text {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      animation: pulse 2s infinite;
      text-shadow: 0 0 15px rgba(255,255,255,0.4);
      user-select: none;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.6; }
    }

    /* Background video styling */
    .profile-bg-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      transition: filter 1s ease;
    }

    /* Blur transition when overlay is active */
    .profile-container.blurred,
    .profile-bg-video.blurred {
      filter: blur(20px);
    }

    .profile-container {
      transition: filter 1s ease;
    }

    body.profile-page.has-bg-video::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    /*  backdrop-filter: blur(6px);*/
      z-index: 1;
    }
    
    body.profile-page.no-bg-blur::before {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    body.profile-page.has-bg-video.no-bg-blur::before {
      background: transparent;
    }
    
    /* Make sure profile elements sit above background video and overlay */
    .profile-container {
      position: relative;
      z-index: 2;
    }
    #video-mute-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
    }

    #video-mute-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
  </style>
</head>
<body class="profile-page" id="body">

  <!-- Loading State -->
  <div id="state-loading" class="profile-loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading</div>
  </div>

  <!-- Profile State (hidden by default) -->
  <div id="state-profile" class="profile-container" style="display:none;"></div>

  <!-- 404 State (hidden by default) -->
  <div id="state-404" style="display:none;">
    <div class="profile-404">
      <div class="profile-404-code">404</div>
      <div class="profile-404-msg">User not found</div>
      <a href="/" class="profile-404-link">Back to kpr.lol</a>
    </div>
  </div>

  <!-- Banned State (hidden by default) -->
  <div id="state-banned" style="display:none;">
    <div class="profile-404">
      <div style="font-size:3rem; margin-bottom:12px;">🔨</div>
      <div class="profile-404-code" style="font-size:2rem;">Banned</div>
      <div class="profile-404-msg" id="banned-reason">This user has been banned.</div>
      <a href="/" class="profile-404-link">Back to kpr.lol</a>
    </div>
  </div>

  <!-- Error State (hidden by default) -->
  <div id="state-error" style="display:none;">
    <div class="profile-error">
      <i class="fas fa-exclamation-triangle"></i>
      <div class="profile-error-msg">Something went wrong</div>
      <a href="/" class="profile-error-link">Back to kpr.lol</a>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    /* =============================================
       kpr.lol — Profile Renderer / 404 Handler
       ============================================= */

    const KNOWN_PATHS = ['/', '/index.html', '/login', '/login.html', '/signup', '/signup.html', '/dashboard', '/dashboard.html', '/admin', '/admin.html'];

    const PLATFORM_ICONS = {
      discord:    'fa-brands fa-discord',
      twitter:    'fa-brands fa-x-twitter',
      x:          'fa-brands fa-x-twitter',
      instagram:  'fa-brands fa-instagram',
      youtube:    'fa-brands fa-youtube',
      github:     'fa-brands fa-github',
      telegram:   'fa-brands fa-telegram',
      spotify:    'fa-brands fa-spotify',
      soundcloud: 'fa-brands fa-soundcloud',
      twitch:     'fa-brands fa-twitch',
      tiktok:     'fa-brands fa-tiktok',
      steam:      'fa-brands fa-steam',
      reddit:     'fa-brands fa-reddit',
      linkedin:   'fa-brands fa-linkedin',
      snapchat:   'fa-brands fa-snapchat',
      pinterest:  'fa-brands fa-pinterest',
      website:    'fa-solid fa-globe',
      email:      'fa-solid fa-envelope',
      other:      'fa-solid fa-link'
    };

    const PLATFORM_LABELS = {
      discord: 'Discord', twitter: 'Twitter / X', x: 'X', instagram: 'Instagram',
      youtube: 'YouTube', github: 'GitHub', telegram: 'Telegram', spotify: 'Spotify',
      soundcloud: 'SoundCloud', twitch: 'Twitch', tiktok: 'TikTok', steam: 'Steam',
      reddit: 'Reddit', linkedin: 'LinkedIn', snapchat: 'Snapchat', pinterest: 'Pinterest',
      website: 'Website', email: 'Email', other: 'Link'
    };

    /* ── Badge Catalog ─────────────────────────────────────
     * To add a new badge, just add a new entry here.
     * icon  = FontAwesome class
     * label = tooltip text shown on hover
     * color = icon color
     */
    const BADGE_CATALOG = {
      dev:         { icon: 'fas fa-code',            label: 'Developer',    color: '#a78bfa' },
      og:          { icon: 'fas fa-crown',           label: 'OG',           color: '#facc15' },
      supporter:   { icon: 'fas fa-heart',           label: 'Supporter',    color: '#f472b6' },
      vip:         { icon: 'fas fa-gem',             label: 'VIP',          color: '#38bdf8' },
      verified:    { icon: 'fas fa-circle-check',    label: 'Verified',     color: '#4ade80' },
      staff:       { icon: 'fas fa-shield-halved',   label: 'Staff',        color: '#fb923c' },
      beta:        { icon: 'fas fa-flask',           label: 'Beta Tester',  color: '#c084fc' },
      contributor: { icon: 'fas fa-code-branch',     label: 'Contributor',  color: '#34d399' },
      partner:     { icon: 'fas fa-handshake',       label: 'Partner',      color: '#fbbf24' },
      donor:       { icon: 'fas fa-dollar-sign',     label: 'Donor',        color: '#22d3ee' },
    };

    // --- Utility: hex to RGB for CSS var ---
    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const num = parseInt(hex, 16);
      return `${(num >> 16) & 255}, ${(num >> 8) & 255}, ${num & 255}`;
    }

    // --- Escape HTML ---
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // --- State management ---
    function showState(id) {
      ['state-loading', 'state-profile', 'state-404', 'state-error', 'state-banned'].forEach(s => {
        document.getElementById(s).style.display = s === id ? '' : 'none';
      });
    }

    // --- Render profile ---
    function renderProfile(data) {
      // Handle banned users — show generic message, never leak ban reason to public
      if (data.banned) {
        document.getElementById('banned-reason').textContent = 'This user has been banned.';
        showState('state-banned');
        return;
      }

      const body = document.getElementById('body');
      const container = document.getElementById('state-profile');

      // -- Background --
      const bgColor = data.settings?.bgColor || data.settings?.bg_color || '#0a0a0f';
      body.style.setProperty('--bg-color', bgColor);
      body.style.backgroundColor = bgColor;

      // Check for video background
      const bgVideo = data.settings?.bgVideoUrl || data.settings?.bg_video_url || '';
      let bgVideoEl = document.getElementById('bg-video');
      if (bgVideoEl) bgVideoEl.remove();

      if (bgVideo) {
        bgVideoEl = document.createElement('video');
        bgVideoEl.id = 'bg-video';
        bgVideoEl.src = bgVideo;
        bgVideoEl.loop = true;
        bgVideoEl.muted = true;
        bgVideoEl.playsInline = true;
        bgVideoEl.className = 'profile-bg-video';
        body.appendChild(bgVideoEl);
  //      bgVideoEl.play().catch(e => console.log("Video autoplay failed:", e));
        const muteBtn = document.createElement('button');
        muteBtn.id = 'video-mute-btn';
        muteBtn.innerHTML = '<i class="fas fa-volume-xmark"></i>';
        muteBtn.title = 'Unmute video';
        document.body.appendChild(muteBtn);
        muteBtn.addEventListener('click', () => {
          bgVideoEl.muted = !bgVideoEl.muted;
          muteBtn.innerHTML = bgVideoEl.muted? '<i class="fas fa-volume-xmark"></i>' : '<i class="fas fa-volume-up"></i>';
          muteBtn.title = bgVideoEl.muted ? 'Unmute video' : 'Mute video';
        });
        body.classList.add('has-bg-video');
        body.classList.remove('has-bg-image');
        body.style.backgroundImage = '';
      } else {
        body.classList.remove('has-bg-video');
        const bgImage = data.settings?.bgImageUrl || data.settings?.bg_image_url || '';
        if (bgImage) {
          body.style.backgroundImage = `url(${bgImage})`;
          body.classList.add('has-bg-image');
        } else {
          body.style.backgroundImage = '';
          body.classList.remove('has-bg-image');
        }
      }

      // -- Accent --
      const accent = data.settings?.accentColor || data.settings?.accent_color || '#a78bfa';
      container.style.setProperty('--accent', accent);
      container.style.setProperty('--accent-rgb', hexToRgb(accent));

      // -- OG tags --
      document.title = `${data.displayName || data.display_name || data.username} — kpr.lol`;
      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.content = data.displayName || data.display_name || data.username;
      const ogDesc = document.querySelector('meta[property="og:description"]');
      if (ogDesc) ogDesc.content = data.bio || 'Check out my profile on kpr.lol';
      if (data.avatarUrl || data.avatar_url) {
        const ogImg = document.querySelector('meta[property="og:image"]');
        if (ogImg) ogImg.content = data.avatarUrl || data.avatar_url;
      }

      // -- Avatar --
      const avatarUrl = data.avatarUrl || data.avatar_url || 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><rect fill="#1a1a24" width="128" height="128"/><circle cx="64" cy="48" r="24" fill="#2a2a3a"/><ellipse cx="64" cy="110" rx="40" ry="30" fill="#2a2a3a"/></svg>'
      );

      // -- Social links --
      let linksHtml = '';
      const links = data.socialLinks || data.social_links || data.socials || [];
      links.forEach(link => {
        const platform = (link.platform || 'other').toLowerCase();
        const icon = PLATFORM_ICONS[platform] || PLATFORM_ICONS.other;
        const label = link.label || link.title || PLATFORM_LABELS[platform] || platform;
        const url = link.url || '#';
        linksHtml += `
          <a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="social-link">
            <i class="${icon}"></i>
            <span>${esc(label)}</span>
          </a>`;
      });

      // -- Music player --
      let musicHtml = '';
      const playlist = data.settings?.musicPlaylist;
      const hasSingleSong = !!(data.settings?.musicUrl || data.settings?.music_url);

      if (playlist && playlist.length > 0) {
        // Admin playlist — full player with cover, prev/next
        const first = playlist[0];
        musicHtml = `
          <div class="profile-music" id="music-player">
            <img class="profile-music-cover" id="music-cover" src="${esc(first.cover || '')}" alt="Cover" onerror="this.style.opacity='0'" />
            <div class="profile-music-info">
              <div class="profile-music-title" id="music-title">${esc(first.title || 'Now Playing')}</div>
              ${first.artist ? `<div class="profile-music-artist" id="music-artist">${esc(first.artist)}</div>` : '<div class="profile-music-artist" id="music-artist"></div>'}
            </div>
            <div class="profile-music-controls">
              <button class="profile-music-btn" id="music-prev" title="Previous"><i class="fas fa-backward"></i></button>
              <button class="profile-music-btn" id="music-toggle" title="Play / Pause"><i class="fas fa-play"></i></button>
              <button class="profile-music-btn" id="music-next" title="Next"><i class="fas fa-forward"></i></button>
            </div>
            <div class="profile-music-volume">
              <i class="fas fa-volume-up"></i>
              <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.5">
            </div>
            <audio id="profile-audio" preload="metadata"></audio>
          </div>`;
      } else if (hasSingleSong) {
        const musicUrl    = data.settings?.musicUrl    || data.settings?.music_url    || '';
        const musicTitle  = data.settings?.musicTitle  || data.settings?.music_title  || 'Now Playing';
        const musicArtist = data.settings?.musicArtist || data.settings?.music_artist || '';
        musicHtml = `
          <div class="profile-music" id="music-player">
            <img class="profile-music-cover" id="music-cover" src="" alt="Cover" style="opacity:0;" />
            <div class="profile-music-info">
              <div class="profile-music-title" id="music-title">${esc(musicTitle)}</div>
              ${musicArtist ? `<div class="profile-music-artist" id="music-artist">${esc(musicArtist)}</div>` : '<div class="profile-music-artist" id="music-artist"></div>'}
            </div>
            <div class="profile-music-controls">
              <button class="profile-music-btn" id="music-toggle" title="Play / Pause"><i class="fas fa-play"></i></button>
            </div>
            <div class="profile-music-volume">
              <i class="fas fa-volume-up"></i>
              <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.5">
            </div>
            <audio id="profile-audio" src="${esc(musicUrl)}" preload="metadata" loop></audio>
          </div>`;
      }

      // -- Views --
      let viewsHtml = '';
      if (data.views != null || data.profile_views != null) {
        const views = data.views ?? data.profile_views ?? 0;
        viewsHtml = `
          <div class="profile-views">
            <i class="fas fa-eye"></i>
            <span>${Number(views).toLocaleString()} views</span>
          </div>`;
      }

      // -- User Badges (icons) --
      let userBadgesHtml = '';
      const badgeList = data.badges || [];
      if (badgeList.length > 0) {
        userBadgesHtml += '<div class="profile-badges">';
        badgeList.forEach(id => {
          const b = BADGE_CATALOG[id];
          if (!b) return;
          userBadgesHtml += `<span class="profile-badge-icon" data-tooltip="${esc(b.label)}" style="color: ${b.color};"><i class="${b.icon}"></i></span>`;
        });
        userBadgesHtml += '</div>';
      }

      // -- Pronouns / Aliases --
      let badgesHtml = '';
      if (data.pronouns || data.aliases) {
        badgesHtml += '<div class="bio-details">';
        if (data.pronouns) badgesHtml += `<span class="bio-badge" data-tooltip="Pronouns"><i class="fas fa-id-card" style="margin-right: 5px; color: #888;"></i> ${esc(data.pronouns)}</span>`;
        if (data.aliases) badgesHtml += `<span class="bio-badge" data-tooltip="Aliases"><i class="fas fa-user-tag" style="margin-right: 5px; color: #888;"></i> ${esc(data.aliases)}</span>`;
        badgesHtml += '</div>';
      }

      // -- Build card --
      container.innerHTML = `
        <div class="profile-card">
          <img class="profile-avatar" src="${esc(avatarUrl)}" alt="${esc(data.displayName || data.display_name || data.username)}" onerror="this.style.display='none'" />
          <h1 class="profile-name">${esc(data.displayName || data.display_name || data.username)}</h1>
          ${userBadgesHtml}
          ${badgesHtml}
          ${data.bio ? `<p class="profile-bio">${esc(data.bio)}</p>` : ''}
          ${linksHtml ? `<div class="profile-links">${linksHtml}</div>` : ''}
          ${musicHtml}
          ${viewsHtml}
        </div>
        <div class="profile-footer">
          <a href="/">kpr.lol</a>
        </div>`;

      showState('state-profile');

      // -- Init music player --
      const hasMusic = !!(data.settings?.musicPlaylist?.length || data.settings?.musicUrl || data.settings?.music_url);
      if (hasMusic) initMusicPlayer(data);

      // Apply permanent background blur setting
      const bgBlurEnabled = data.settings?.bgBlur ?? data.settings?.bg_blur ?? true;
      if (bgBlurEnabled) {
        body.classList.remove('no-bg-blur');
      } else {
        body.classList.add('no-bg-blur');
      }

      // -- Enter Overlay and Blur flow --
      const hasVideo = !!bgVideo;
      const shouldShowOverlay = hasMusic || hasVideo;

      if (shouldShowOverlay) {
        let overlay = document.getElementById('enter-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = 'enter-overlay';
          overlay.innerHTML = '<div id="enter-click-text">Click</div>';
          document.body.appendChild(overlay);
        }
        overlay.style.display = 'flex';
        overlay.classList.remove('fade-out');

        // The click overlay itself always uses blur to hide background before clicking
        overlay.style.backdropFilter = 'blur(25px)';
        overlay.style.webkitBackdropFilter = 'blur(25px)';
        container.classList.add('blurred');
        if (bgVideoEl) bgVideoEl.classList.add('blurred');

        overlay.onclick = () => {
          overlay.classList.add('fade-out');
          container.classList.remove('blurred');
          if (bgVideoEl) {
            bgVideoEl.classList.remove('blurred');
            bgVideoEl.play().catch(() => {});
            
            // Unmute background video if configured
            const isMuted = data.settings?.bgVideoMuted ?? data.settings?.bg_video_muted ?? true;
            if (!isMuted) {
              bgVideoEl.muted = false;
            }

            const muteBtn = document.getElementById('video-mute-btn');
            if (muteBtn) {
              muteBtn.innerHTML = bgVideoEl.muted
                ? '<i class="fas fa-volume-xmark"></i>'
                : '<i class="fas fa-volume-up"></i>';
              muteBtn.title = bgVideoEl.muted ? 'Unmute video' : 'Mute video';
            }

          }
          
          const autoplayEnabled = data.settings?.musicAutoplay ?? data.settings?.music_autoplay ?? false;
          if (autoplayEnabled && window.playProfileMusic) {
            window.playProfileMusic();
          }
          
          setTimeout(() => {
            overlay.style.display = 'none';
          }, 800);
        };
      } else {
        const overlay = document.getElementById('enter-overlay');
        if (overlay) overlay.style.display = 'none';
        container.classList.remove('blurred');
        
        // No overlay, apply video mute configuration immediately
        if (bgVideoEl) {
          const isMuted = data.settings?.bgVideoMuted ?? data.settings?.bg_video_muted ?? true;
          if (!isMuted) {
            bgVideoEl.muted = false;
          }
        }
      }
    }

    // --- Music player ---
    function initMusicPlayer(data) {
      const settings  = data.settings || {};
      const playlist  = settings.musicPlaylist;
      const songs     = (playlist && playlist.length > 0)
        ? playlist
        : (settings.musicUrl || settings.music_url)
          ? [{ url: settings.musicUrl || settings.music_url, title: settings.musicTitle || settings.music_title || 'Now Playing', artist: settings.musicArtist || settings.music_artist || '', cover: '' }]
          : [];

      if (!songs.length) return;

      const audio  = document.getElementById('profile-audio');
      const btn    = document.getElementById('music-toggle');
      const prevBtn = document.getElementById('music-prev');
      const nextBtn = document.getElementById('music-next');
      const cover  = document.getElementById('music-cover');
      const titleEl  = document.getElementById('music-title');
      const artistEl = document.getElementById('music-artist');
      const volSlider = document.getElementById('music-volume');
      if (!audio || !btn) return;

      let idx = 0;
      audio.volume = 0.5;

      function loadSong(i) {
        const s = songs[i];
        audio.src = s.url || '';
        if (titleEl)  titleEl.textContent  = s.title  || 'Now Playing';
        if (artistEl) artistEl.textContent = s.artist || '';
        if (cover) {
          cover.src = s.cover || '';
          cover.style.opacity = s.cover ? '1' : '0';
        }
      }

      function playSong() {
        audio.play().catch(() => {});
        btn.innerHTML = '<i class="fas fa-pause"></i>';
      }

      function pauseSong() {
        audio.pause();
        btn.innerHTML = '<i class="fas fa-play"></i>';
      }

      btn.addEventListener('click', () => audio.paused ? playSong() : pauseSong());

      window.playProfileMusic = function() {
        playSong();
      };

      if (prevBtn) {
        prevBtn.addEventListener('click', () => {
          idx = (idx - 1 + songs.length) % songs.length;
          loadSong(idx);
          playSong();
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          idx = (idx + 1) % songs.length;
          loadSong(idx);
          playSong();
        });
      }

      audio.addEventListener('ended', () => {
        if (songs.length > 1) {
          idx = (idx + 1) % songs.length;
          loadSong(idx);
          playSong();
        } else {
          // single song — replay
          audio.currentTime = 0;
          playSong();
        }
      });

      if (volSlider) {
        volSlider.addEventListener('input', e => { audio.volume = e.target.value; });
      }

      loadSong(0);
    }

    // --- Main entry ---
    async function init() {
      const path = window.location.pathname.replace(/\/+$/, '') || '/';

      // Check known paths
      if (KNOWN_PATHS.includes(path) || KNOWN_PATHS.includes(path + '.html')) {
        // If we're on a known path and this 404 page loaded, something went wrong
        showState('state-404');
        return;
      }

      // Extract username (first segment after /)
      const segments = path.split('/').filter(Boolean);
      const username = segments[0];

      if (!username || username.length > 40) {
        showState('state-404');
        return;
      }

      try {
        const res = await API.getProfile(username);
        if (res && (res.success !== false)) {
          const profile = res.data || res.profile || res.user || res;
          renderProfile(profile);
        } else {
          showState('state-404');
        }
      } catch (err) {
        if (err.status === 404 || (err.response && err.response.status === 404)) {
          showState('state-404');
        } else {
          console.error('Profile load error:', err);
          showState('state-error');
        }
      }
    }

    init();
  </script>
</body>
</html>
